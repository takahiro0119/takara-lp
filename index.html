<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユニットバス取り付け研修 | 建職チョイス</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #fff;
            max-width: 100%;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 750px;
            margin: 0 auto;
            background-color: #fff;
        }
        
        .section-image {
            width: 100%;
            display: block;
        }
        
        /* CTAボタン - ぽよんぽよんアニメーション */
        .cta-wrapper {
            padding: 10px 15px;
            background-color: #fff;
        }
        
        .cta-button {
            display: block;
            width: 100%;
            cursor: pointer;
            animation: bounce 2s ease-in-out infinite;
            transition: transform 0.2s;
        }
        
        .cta-button:hover {
            transform: scale(1.02);
        }
        
        .cta-button img {
            width: 100%;
            display: block;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0) scale(1);
            }
            10% {
                transform: translateY(-8px) scale(1.02);
            }
            30% {
                transform: translateY(-4px) scale(1.01);
            }
            40% {
                transform: translateY(0) scale(1);
            }
            60% {
                transform: translateY(-3px) scale(1.01);
            }
            70% {
                transform: translateY(0) scale(1);
            }
        }
        
        /* モーダル */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #fff 0%, #f8f8f8 100%);
            border-radius: 20px;
            padding: 30px 25px;
            max-width: 350px;
            width: 100%;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: modalBounce 0.5s ease-out;
        }
        
        @keyframes modalBounce {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            border: none;
            background: #ddd;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: #666;
            line-height: 30px;
            transition: all 0.2s;
        }
        
        .modal-close:hover {
            background: #ccc;
            color: #333;
        }
        
        .modal-badge {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .modal-date {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .modal-date span {
            color: #ff6b6b;
        }
        
        .modal-title {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
        }
        
        .modal-slots {
            background: #fff3cd;
            border: 2px dashed #ffc107;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .modal-slots-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .modal-slots-number {
            font-size: 36px;
            font-weight: bold;
            color: #ff6b6b;
        }
        
        .modal-slots-number span {
            font-size: 18px;
            color: #333;
        }
        
        .modal-cta {
            display: block;
            background: linear-gradient(135deg, #06c755 0%, #05b34d 100%);
            color: white;
            text-decoration: none;
            padding: 18px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(6, 199, 85, 0.4);
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }
        
        .modal-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 199, 85, 0.5);
        }
        
        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 4px 15px rgba(6, 199, 85, 0.4);
            }
            50% {
                box-shadow: 0 4px 25px rgba(6, 199, 85, 0.6);
            }
        }
        
        .modal-line-icon {
            width: 24px;
            height: 24px;
            vertical-align: middle;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 1. ヒーロー -->
        <img src="01_hero.png" alt="ユニットバス取り付け研修" class="section-image">
        
        <!-- 2. CTAボタン（ぽよんぽよん） -->
        <div class="cta-wrapper">
            <a href="YOUR_LINE_URL" class="cta-button" target="_blank">
                <img src="02_cta_button.png" alt="今すぐ友だち追加して研修の詳細を受け取る">
            </a>
        </div>
        
        <!-- 3. 収入シミュレーション -->
        <img src="03_income_simulation.png" alt="収入シミュレーション" class="section-image">
        
        <!-- 4. 3つの安心ポイント見出し -->
        <img src="04_3points_header.png" alt="3つの安心ポイント" class="section-image">
        
        <!-- 5. 3つのポイント詳細 -->
        <img src="05_3points_detail.png" alt="研修費0円・営業不要・元手なしOK" class="section-image">
        
        <!-- 6. 三角形テキスト -->
        <img src="06_triangle_text.png" alt="LINEを友だち追加して研修の詳細をご確認ください" class="section-image">
        
        <!-- 7. CTAボタン（ぽよんぽよん） -->
        <div class="cta-wrapper">
            <a href="YOUR_LINE_URL" class="cta-button" target="_blank">
                <img src="02_cta_button.png" alt="今すぐ友だち追加して研修の詳細を受け取る">
            </a>
        </div>
    </div>
    
    <!-- モーダルポップアップ -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-badge">🔥 緊急募集中</div>
            <div class="modal-date"><span id="currentDate"></span>現在</div>
            <div class="modal-title"><span id="currentMonth"></span>の残り研修受け入れ枠</div>
            <div class="modal-slots">
                <div class="modal-slots-label">残り</div>
                <div class="modal-slots-number">5<span>名</span></div>
            </div>
            <a href="YOUR_LINE_URL" class="modal-cta" target="_blank">
                <svg class="modal-line-icon" viewBox="0 0 24 24" fill="white">
                    <path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.349 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/>
                </svg>
                今すぐLINEで詳細を確認
            </a>
        </div>
    </div>
    
    <script>
        // 現在の日付を設定
        const now = new Date();
        const month = now.getMonth() + 1;
        const date = now.getDate();
        document.getElementById('currentDate').textContent = `${month}月${date}日`;
        document.getElementById('currentMonth').textContent = `${month}月`;
        
        // 6秒後にモーダルを表示
        setTimeout(function() {
            document.getElementById('modal').classList.add('show');
        }, 6000);
        
        // モーダルを閉じる
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }
        
        // オーバーレイクリックで閉じる
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
